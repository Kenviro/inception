services: 
  nginx:
    container_name: nginx
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    volumes:
      - wordpress:/var/www/html
    depends_on:
      wordpress:
        condition: service_healthy
    ports:
      - "443:443" # 443:???
    restart: unless-stopped
    networks:
      - inception

  wordpress:
    container_name: wordpress
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    volumes:
      - wordpress:/var/www/html/wp-content
    env_file: .env
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - inception
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep php-fpm8.2 > /dev/null && test -f /var/www/html/wp-config.php || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  mariadb:
    container_name: mariadb
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    volumes:
      - DB:/var/run/mysqld
    env_file: .env
    networks:
      - inception
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "${SQL_HOST}", "-u", "${SQL_USER}", "-p${SQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  wordpress:
    driver: local
  DB:
    driver: local

networks:
  inception:
    driver: bridge